<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sobre | NordForma3D</title>
  <meta name="robots" content="index,follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/sobre.css">
</head>
<body>

<main id="main">

  <!-- ─── SOBRE ─────────────────────────────────── -->
  <section style="padding:72px 0 40px">
    <div class="container">
      <div class="sobre-grid">

        <div>
          <span class="tag" id="sobre-tag"></span>
          <h1 class="h1" style="margin:10px 0 24px" id="sobre-titulo"></h1>
          <div id="sobre-paragrafos"></div>
          <div id="sobre-btn" style="margin-top:8px"></div>
        </div>

        <div>
          <div class="card">
            <h3 class="h3" style="margin-bottom:20px">O que nos define</h3>
            <div id="diferenciais-lista"></div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- ─── ATUAÇÃO REGIONAL ─────────────────────── -->
  <section class="section-surface">
    <div class="container">
      <div class="regiao-bloco">
        <span class="tag" id="regiao-tag"></span>
        <h2 class="h2" style="margin:10px 0 20px" id="regiao-titulo"></h2>
        <p class="muted" style="line-height:1.8;margin-bottom:14px" id="regiao-desc"></p>
        <p class="muted" style="line-height:1.8" id="regiao-cta-txt"></p>
      </div>
    </div>
  </section>

  <!-- ─── FAQ ───────────────────────────────────── -->
  <section class="section">
    <div class="container">
      <span class="tag">Dúvidas frequentes</span>
      <h2 class="h2" style="margin:10px 0 40px">Perguntas Frequentes</h2>
      <div class="faq-lista" id="faq-lista"></div>
    </div>
  </section>

  <!-- ─── CTA ───────────────────────────────────── -->
  <section style="padding:60px 0 88px">
    <div class="container" style="text-align:center">
      <h2 class="h2" style="margin-bottom:16px">Ainda tem dúvidas?</h2>
      <p class="muted" style="margin-bottom:32px">Fale diretamente com a gente no WhatsApp — respondemos rápido!</p>
      <div id="cta-btn"></div>
    </div>
  </section>

</main>

<script src="js/dados.js"></script>
<script src="js/componentes.js"></script>
<script>
  aplicarMeta('sobre');
  renderHeader('sobre.html');
  renderFooter();
  renderFAB();

  /* ── Sobre: textos ───────────────────────────── */
  const s = DADOS.sobre;
  document.getElementById('sobre-tag').textContent    = s.tag;
  document.getElementById('sobre-titulo').textContent = s.titulo;

  document.getElementById('sobre-paragrafos').innerHTML = s.paragrafos.map(p =>
    `<p style="color:var(--muted);margin-bottom:16px;line-height:1.8">${p}</p>`
  ).join('');

  document.getElementById('sobre-btn').innerHTML = btnWA('Falar conosco');

  /* ── Diferenciais card ───────────────────────── */
  document.getElementById('diferenciais-lista').innerHTML = s.diferenciais.map((d, i) =>
    `<div class="diferencial-item" ${i === s.diferenciais.length - 1 ? 'style="border-bottom:none;padding-bottom:0"' : ''}>
      <div class="diferencial-check">${SVG_CHECK}</div>
      <span class="diferencial-txt">${d}</span>
    </div>`
  ).join('');

  /* ── Atuação regional ────────────────────────── */
  const r = DADOS.regiaoAtendimento;
  const n = DADOS.empresa.nome;
  document.getElementById('regiao-tag').textContent    = r.tag;
  document.getElementById('regiao-titulo').textContent = r.titulo;
  document.getElementById('regiao-desc').innerHTML =
    `Atendemos clientes em ${r.cidades.join(', ')} e diversas outras cidades do Nordeste e do Brasil. ` +
    `Com a <strong style="color:var(--text)">${n}</strong>, você tem acesso a ` +
    `<strong style="color:var(--text)">impressão 3D personalizada no Sertão de Pernambuco</strong> ` +
    `com qualidade de grandes centros e atendimento de quem está perto de você.`;
  document.getElementById('regiao-cta-txt').innerHTML =
    `Procurando por <strong style="color:var(--text)">protótipos 3D em Salgueiro</strong> ou ` +
    `<strong style="color:var(--text)">peças personalizadas em 3D</strong> com entrega rápida? Fale conosco!`;

  /* ── FAQ ─────────────────────────────────────── */
  document.getElementById('faq-lista').innerHTML = DADOS.faq.map(f =>
    `<details class="faq-item">
      <summary>${f.pergunta}<span class="faq-ico">+</span></summary>
      <div class="faq-resposta">${f.resposta}</div>
    </details>`
  ).join('');

  /* ── CTA ─────────────────────────────────────── */
  document.getElementById('cta-btn').innerHTML = btnWA('Falar no WhatsApp');
</script>

</body>
</html>

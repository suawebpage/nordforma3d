<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NordForma3D</title><!-- sobrescrito por componentes.js -->
  <meta name="robots" content="index,follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

<!-- Header e Footer injetados por componentes.js -->

<main id="main">

  <!-- ─── HERO ─────────────────────────────────── -->
  <section class="hero">
    <div class="container">
      <div class="hero-grid">

        <div>
          <span class="tag" id="hero-tag"></span>
          <h1 class="h1" id="hero-titulo" style="margin:10px 0 20px"></h1>
          <p class="hero-desc" id="hero-desc"></p>
          <div class="hero-btns" id="hero-btns"></div>
          <div class="hero-stats" id="hero-stats"></div>
        </div>

        <div>
          <div id="carrossel-hero"></div>
        </div>

      </div>
    </div>
  </section>

  <!-- ─── DIFERENCIAIS ─────────────────────────── -->
  <section class="strip">
    <div class="container">
      <div class="strip-grid" id="strip-grid"></div>
    </div>
  </section>

  <!-- ─── SERVIÇOS PREVIEW ─────────────────────── -->
  <section class="section">
    <div class="container">
      <span class="tag">O que fazemos</span>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px;gap:16px;flex-wrap:wrap">
        <h2 class="h2">Nossos Serviços</h2>
        <a href="servicos.html" class="btn btn-ghost" style="font-size:13px">Ver todos →</a>
      </div>
      <div class="servicos-preview" id="servicos-preview"></div>
    </div>
  </section>

  <!-- ─── SEO LOCAL ─────────────────────────────── -->
  <section class="section-surface">
    <div class="container">
      <div class="seo-bloco">
        <span class="tag">Onde atuamos</span>
        <h2 class="h2" style="margin:10px 0 20px" id="seo-titulo"></h2>
        <p class="muted" style="font-size:.97rem;line-height:1.8" id="seo-desc"></p>
      </div>
    </div>
  </section>

  <!-- ─── GALERIA PREVIEW ───────────────────────── -->
  <section class="section">
    <div class="container">
      <span class="tag">Projetos recentes</span>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px;gap:16px;flex-wrap:wrap">
        <h2 class="h2">Galeria</h2>
        <a href="galeria.html" class="btn btn-ghost" style="font-size:13px">Ver todos →</a>
      </div>
      <div class="galeria-preview" id="galeria-preview"></div>
    </div>
  </section>

  <!-- ─── CTA FINAL ────────────────────────────── -->
  <section class="section">
    <div class="container">
      <div class="cta-box">
        <h2 class="h2" style="margin-bottom:16px">Transforme sua ideia em realidade.</h2>
        <p class="muted" style="margin-bottom:32px;font-size:1rem">Orçamento rápido, produção personalizada e envio seguro para todo o Brasil.</p>
        <div id="cta-btn"></div>
      </div>
    </div>
  </section>

</main>

<!-- Scripts — dados DEVEM vir antes de componentes -->
<script src="js/dados.js"></script>
<script src="js/componentes.js"></script>
<script>
  /* ── Init ─────────────────────────────────────── */
  aplicarMeta('index');
  renderHeader('index.html');
  renderFooter();
  renderFAB();

  /* ── Hero ─────────────────────────────────────── */
  const h = DADOS.hero;
  document.getElementById('hero-tag').textContent = h.tag;
  document.getElementById('hero-titulo').innerHTML =
    `${h.titulo}<br><em style="color:var(--blue-lt);font-style:normal">${h.tituloDestaque}</em><br>${h.tituloFim}`;
  document.getElementById('hero-desc').textContent = h.descricao;

  document.getElementById('hero-btns').innerHTML =
    btnWA(h.btnPrimario) +
    `<a href="${h.btnSecundarioHref}" class="btn btn-ghost">${h.btnSecundario}</a>`;

  document.getElementById('hero-stats').innerHTML = h.stats.map(s =>
    `<div><div class="hero-stat-num">${s.numero}</div><div class="hero-stat-label">${s.label}</div></div>`
  ).join('');

  /* ── Carrossel Hero ───────────────────────────── */
  renderCarrossel('carrossel-hero', DADOS.carrosselHero);

  /* ── Diferenciais strip ───────────────────────── */
  document.getElementById('strip-grid').innerHTML = DADOS.diferenciais.map(d =>
    `<div class="strip-item">
      <div class="strip-icone">${d.icone}</div>
      <div class="strip-titulo">${d.titulo}</div>
      <div class="strip-desc">${d.descricao}</div>
    </div>`
  ).join('');

  /* ── Serviços preview (máx 6) ─────────────────── */
  document.getElementById('servicos-preview').innerHTML = DADOS.servicos.slice(0, 6).map(s =>
    `<a href="servicos.html" class="card servico-mini">
      <div class="servico-mini-icone">${s.icone}</div>
      <div class="servico-mini-titulo">${s.titulo}</div>
    </a>`
  ).join('');

  /* ── SEO bloco ────────────────────────────────── */
  const r = DADOS.regiaoAtendimento;
  const n = DADOS.empresa.nome;
  document.getElementById('seo-titulo').textContent = r.titulo;
  document.getElementById('seo-desc').innerHTML =
    `A <strong style="color:var(--text)">${n}</strong> é referência em ` +
    `<strong style="color:var(--text)">impressão 3D em Salgueiro PE</strong> e atende todo o ` +
    `<strong style="color:var(--text)">Sertão de Pernambuco</strong>. ` +
    `Trabalhamos com <strong style="color:var(--text)">peças personalizadas em 3D</strong> e soluções sob medida ` +
    `— com envio para qualquer cidade do Brasil. Atendemos: ${r.cidades.join(', ')} e mais.`;

  /* ── Galeria preview (primeiros 6 itens) ─────── */
  document.getElementById('galeria-preview').innerHTML = DADOS.galeria.slice(0, 6).map(g =>
    `<a href="galeria.html" class="galeria-item" title="${g.alt}">
      ${g.src ? `<img src="${g.src}" alt="${g.alt}" loading="lazy">` : g.icone}
    </a>`
  ).join('');

  /* ── CTA btn ─────────────────────────────────── */
  document.getElementById('cta-btn').innerHTML = btnWA('Solicitar Orçamento no WhatsApp', 'btn-lg');
</script>

</body>
</html>

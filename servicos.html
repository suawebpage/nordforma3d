<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Serviços | NordForma3D</title>
  <meta name="robots" content="index,follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/servicos.css">
</head>
<body>

<main id="main">

  <!-- ─── INTRO ────────────────────────────────── -->
  <section style="padding:72px 0 40px">
    <div class="container">
      <span class="tag">O que fazemos</span>
      <h1 class="h1" style="margin:10px 0 16px">Nossos Serviços</h1>
      <p class="muted" style="max-width:520px;font-size:1rem;margin-bottom:52px">
        Da sua ideia à peça finalizada, trabalhamos com uma ampla variedade de projetos em impressão 3D personalizada. Cada encomenda é única.
      </p>
      <div class="servicos-grid" id="servicos-grid"></div>
    </div>
  </section>

  <!-- ─── PROCESSO ─────────────────────────────── -->
  <section class="section-surface" style="margin-top:60px">
    <div class="container">
      <span class="tag">Como funciona</span>
      <h2 class="h2" style="margin:10px 0 48px">Do pedido à entrega</h2>
      <div class="processo-grid" id="processo-grid"></div>
    </div>
  </section>

  <!-- ─── CTA ──────────────────────────────────── -->
  <section class="servicos-cta">
    <div class="container">
      <h2 class="h2" style="margin-bottom:16px">Tem um projeto em mente?</h2>
      <p class="muted" style="margin-bottom:32px">Entre em contato pelo WhatsApp e receba um orçamento rápido.</p>
      <div id="cta-btn"></div>
    </div>
  </section>

</main>

<script src="js/dados.js"></script>
<script src="js/componentes.js"></script>
<script>
  aplicarMeta('servicos');
  renderHeader('servicos.html');
  renderFooter();
  renderFAB();

  /* ── Serviços grid ──────────────────────────── */
  document.getElementById('servicos-grid').innerHTML = DADOS.servicos.map(s =>
    `<div class="card">
      <div class="servico-icone">${s.icone}</div>
      <h3 class="h3" style="margin-bottom:8px">${s.titulo}</h3>
      <p class="servico-desc">${s.descricao}</p>
    </div>`
  ).join('');

  /* ── Processo ───────────────────────────────── */
  document.getElementById('processo-grid').innerHTML = DADOS.processo.map(p =>
    `<div class="processo-item">
      <div class="processo-label">${p.passo}</div>
      <div class="processo-titulo">${p.titulo}</div>
      <div class="processo-desc">${p.descricao}</div>
    </div>`
  ).join('');

  /* ── CTA ────────────────────────────────────── */
  document.getElementById('cta-btn').innerHTML = btnWA('Solicitar Orçamento');
</script>

</body>
</html>

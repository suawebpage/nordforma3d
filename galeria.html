<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Galeria | NordForma3D</title>
  <meta name="robots" content="index,follow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/galeria.css">
</head>
<body>

<main id="main">

  <!-- ─── INTRO ────────────────────────────────── -->
  <section class="galeria-intro">
    <div class="container">
      <span class="tag">Portfólio</span>
      <h1 class="h1" style="margin:10px 0 16px">Galeria de Projetos</h1>
      <p class="muted" style="max-width:520px;font-size:1rem;margin-bottom:8px">
        Cada peça é única. Aqui você encontra exemplos dos projetos que já realizamos.
      </p>
      <p class="galeria-instagram" style="font-size:13px;color:var(--muted)">
        📸 Siga também no
        <a href="" id="ig-link" target="_blank" rel="noopener noreferrer" id="ig-link"></a>
      </p>
    </div>
  </section>

  <!-- ─── CARROSSEL DESTAQUE ───────────────────── -->
  <section class="galeria-destaque">
    <div class="container">
      <h2 class="h3" style="margin-bottom:20px">Destaques</h2>
      <div id="carrossel-galeria"></div>
    </div>
  </section>

  <!-- ─── GRID COMPLETO ────────────────────────── -->
  <section class="section-surface">
    <div class="container">
      <h2 class="h3" style="margin-bottom:28px">Todos os Projetos</h2>
      <div class="galeria-grid" id="galeria-grid"></div>
    </div>
  </section>

  <!-- ─── CTA ──────────────────────────────────── -->
  <section class="galeria-cta">
    <div class="container">
      <h2 class="h2" style="margin-bottom:16px">Quer uma peça como essa?</h2>
      <p class="muted" style="margin-bottom:32px">Entre em contato e transforme sua ideia em realidade.</p>
      <div id="cta-btn"></div>
    </div>
  </section>

</main>

<script src="js/dados.js"></script>
<script src="js/componentes.js"></script>
<script>
  aplicarMeta('galeria');
  renderHeader('galeria.html');
  renderFooter();
  renderFAB();

  /* ── Instagram link ─────────────────────────── */
  const igLink = document.getElementById('ig-link');
  igLink.href = DADOS.contato.instagram;
  igLink.textContent = DADOS.contato.instagramHandle;

  /* ── Carrossel de destaques ─────────────────── */
  const destaques = DADOS.galeriaDestaquesIndices.map(i => DADOS.galeria[i]).filter(Boolean);
  renderCarrossel('carrossel-galeria', destaques);

  /* ── Grid completo ──────────────────────────── */
  document.getElementById('galeria-grid').innerHTML = DADOS.galeria.map(g =>
    `<div class="galeria-card">
      ${g.src
        ? `<img src="${g.src}" alt="${g.alt}" loading="lazy">`
        : `<span class="galeria-card-icone" aria-label="${g.alt}">${g.icone}</span>
           <span class="galeria-card-cat">${g.categoria}</span>`
      }
    </div>`
  ).join('');

  /* ── CTA ────────────────────────────────────── */
  document.getElementById('cta-btn').innerHTML = btnWA('Solicitar Orçamento');
</script>

</body>
</html>
